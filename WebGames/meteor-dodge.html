<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteor Dodge</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #070b18;
      color: #fff;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .wrap { width: min(900px, 95vw); }
    h1 { margin: .2rem 0; }
    p { opacity: .85; margin: .2rem 0 .8rem; }
    canvas {
      width: 100%;
      max-width: 900px;
      height: auto;
      border: 1px solid #2b335c;
      border-radius: 12px;
      background: linear-gradient(#0b1130, #090d1f);
      display: block;
    }
    .row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; gap: 10px; flex-wrap: wrap; }
    .pill { padding: 6px 10px; border: 1px solid #2b335c; border-radius: 999px; background: #111735; }
    button { background: #4f7cff; color: #fff; border: 0; border-radius: 10px; padding: 8px 12px; cursor: pointer; font-weight: 700; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>☄️ Meteor Dodge</h1>
    <p>Move with ← → (or A / D). You have <strong>2 lives</strong>. Gain extra lives as your score climbs (max 4).</p>
    <canvas id="game" width="900" height="520"></canvas>
    <div class="row">
      <div class="pill">Score: <span id="score">0</span></div>
      <div class="pill">Best: <span id="best">0</span></div>
      <div class="pill">Lives: <span id="lives">2</span></div>
      <button id="restart">Restart</button>
    </div>
  </main>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const livesEl = document.getElementById('lives');
const restartBtn = document.getElementById('restart');

const W = canvas.width, H = canvas.height;
let keys = new Set();
let running = true;
let score = 0;
let best = Number(localStorage.getItem('meteor_dodge_best') || 0);
let lives = 2;
let invincibleTimer = 0;
let extraLifeBannerTimer = 0;
let nextLifeScore = 540;
bestEl.textContent = best;

const MAX_LIVES = 4;
const player = { x: W / 2, y: H - 50, w: 58, h: 24, speed: 430 };
let meteors = [];
let particles = [];
let spawnTimer = 0;
let spawnGap = 0.92;
let t = 0;

function reset() {
  running = true;
  score = 0;
  lives = 2;
  invincibleTimer = 0;
  extraLifeBannerTimer = 0;
  nextLifeScore = Math.floor(rand(500, 601));
  player.x = W / 2;
  meteors = [];
  particles = [];
  spawnTimer = 0;
  spawnGap = 0.92;
  t = 0;
  scoreEl.textContent = '0';
  livesEl.textContent = lives;
}

function rand(a, b) { return Math.random() * (b - a) + a; }

function makeSmoothMeteorShape(type, r) {
  if (type === 'circle') {
    return { points: Array.from({ length: 18 }, (_, i) => ({
      a: (i / 18) * Math.PI * 2,
      rr: r * rand(0.9, 1.03)
    })) };
  }

  // Smoother rounded rock silhouettes (less spiky)
  const count = type === 'diamond' ? 8 : 10;
  const points = [];
  for (let i = 0; i < count; i++) {
    const a = (i / count) * Math.PI * 2;
    const rrBase = type === 'diamond' ? r * (i % 2 ? 0.92 : 1.02) : r;
    const rr = rrBase * rand(0.88, 1.05);
    points.push({ a, rr });
  }
  return { points };
}

function spawnMeteor() {
  const r = rand(11, 26);
  const typeRoll = Math.random();
  const shapeType = typeRoll < 0.42 ? 'circle' : typeRoll < 0.78 ? 'rock' : 'diamond';

  // Difficulty ramps up continuously with time
  const speedBoost = Math.min(300, t * 15.5);
  const driftBoost = Math.min(95, t * 3.2);

  meteors.push({
    x: rand(r, W - r),
    y: -45,
    r,
    vy: rand(120, 230) + speedBoost,
    vx: rand(-26, 26) + rand(-driftBoost, driftBoost),
    spin: rand(-1.5, 1.5),
    rot: rand(0, Math.PI * 2),
    shape: makeSmoothMeteorShape(shapeType, r),
    hue: rand(12, 42),
    craterSeed: [rand(0, 1), rand(0, 1), rand(0, 1)]
  });
}

function hitRectCircle(rx, ry, rw, rh, cx, cy, cr) {
  const nx = Math.max(rx, Math.min(cx, rx + rw));
  const ny = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nx, dy = cy - ny;
  return dx * dx + dy * dy <= cr * cr;
}

function addExplosion(x, y, color = '#ff9f62') {
  for (let i = 0; i < 14; i++) {
    particles.push({
      x, y,
      vx: rand(-130, 130),
      vy: rand(-130, 130),
      life: rand(0.2, 0.45),
      age: 0,
      size: rand(2, 5),
      color
    });
  }
}

function drawRoundedMeteorPath(m) {
  const pts = m.shape.points;
  const xy = pts.map(p => ({ x: Math.cos(p.a) * p.rr, y: Math.sin(p.a) * p.rr }));

  ctx.beginPath();
  for (let i = 0; i < xy.length; i++) {
    const p0 = xy[i];
    const p1 = xy[(i + 1) % xy.length];
    const mx = (p0.x + p1.x) * 0.5;
    const my = (p0.y + p1.y) * 0.5;
    if (i === 0) ctx.moveTo(mx, my);
    else ctx.quadraticCurveTo(p0.x, p0.y, mx, my);
  }
  ctx.closePath();
}

function maybeAwardLife(currentScoreInt) {
  while (currentScoreInt >= nextLifeScore) {
    if (lives < MAX_LIVES) {
      lives += 1;
      livesEl.textContent = lives;
      extraLifeBannerTimer = 1.8;
      addExplosion(player.x, player.y - 16, '#9dffbe');
    }
    nextLifeScore += Math.floor(rand(500, 601));
  }
}

function update(dt) {
  if (!running) return;
  t += dt;
  if (invincibleTimer > 0) invincibleTimer -= dt;
  if (extraLifeBannerTimer > 0) extraLifeBannerTimer -= dt;

  if (keys.has('ArrowLeft') || keys.has('a')) player.x -= player.speed * dt;
  if (keys.has('ArrowRight') || keys.has('d')) player.x += player.speed * dt;
  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));

  // Gets harder over time: faster spawn + occasional burst waves
  spawnTimer += dt;
  spawnGap = Math.max(0.16, 0.92 - t * 0.015);
  while (spawnTimer >= spawnGap) {
    spawnTimer -= spawnGap;
    spawnMeteor();

    const burstChance = Math.min(0.42, 0.05 + t * 0.0028);
    if (Math.random() < burstChance) spawnMeteor();
  }

  for (const m of meteors) {
    m.y += m.vy * dt;
    m.x += m.vx * dt;
    m.rot += m.spin * dt;

    // NO horizontal bounce: wrap around screen edges
    if (m.x < -m.r) m.x = W + m.r;
    else if (m.x > W + m.r) m.x = -m.r;

    if (invincibleTimer <= 0 && hitRectCircle(player.x - player.w / 2, player.y - player.h / 2, player.w, player.h, m.x, m.y, m.r * 0.9)) {
      lives -= 1;
      livesEl.textContent = lives;
      invincibleTimer = 1.0;
      addExplosion(player.x, player.y - 2, '#6ecbff');
      m.y = H + 100;
      if (lives <= 0) running = false;
    }
  }

  meteors = meteors.filter(m => m.y < H + 70);

  for (const p of particles) {
    p.age += dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.98;
    p.vy *= 0.98;
  }
  particles = particles.filter(p => p.age < p.life);

  score += dt * 10;
  const scoreInt = Math.floor(score);
  scoreEl.textContent = scoreInt;
  maybeAwardLife(scoreInt);

  if (score > best) {
    best = scoreInt;
    bestEl.textContent = best;
    localStorage.setItem('meteor_dodge_best', String(best));
  }
}

function drawShip() {
  ctx.save();
  ctx.translate(player.x, player.y);

  // Engine glow
  const engineGlow = ctx.createRadialGradient(0, player.h * 0.85, 1, 0, player.h * 0.95, 24);
  engineGlow.addColorStop(0, 'rgba(110,203,255,0.9)');
  engineGlow.addColorStop(1, 'rgba(110,203,255,0)');
  ctx.fillStyle = engineGlow;
  ctx.beginPath();
  ctx.ellipse(0, player.h * 0.95, 28, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Hull body
  const hull = ctx.createLinearGradient(-32, -8, 32, 18);
  hull.addColorStop(0, '#7fd7ff');
  hull.addColorStop(0.5, '#5ab8ff');
  hull.addColorStop(1, '#2e87cc');
  ctx.fillStyle = hull;
  ctx.beginPath();
  ctx.moveTo(0, -16);
  ctx.quadraticCurveTo(26, -5, 24, 8);
  ctx.quadraticCurveTo(0, 19, -24, 8);
  ctx.quadraticCurveTo(-26, -5, 0, -16);
  ctx.fill();

  // Cockpit
  const canopy = ctx.createLinearGradient(-7, -10, 7, 2);
  canopy.addColorStop(0, '#d6f7ff');
  canopy.addColorStop(1, '#7ecfff');
  ctx.fillStyle = canopy;
  ctx.beginPath();
  ctx.ellipse(0, -6, 8, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wings
  ctx.fillStyle = '#1e5e9a';
  ctx.beginPath();
  ctx.moveTo(-22, 6); ctx.lineTo(-34, 12); ctx.lineTo(-14, 12); ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(22, 6); ctx.lineTo(34, 12); ctx.lineTo(14, 12); ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawMeteor(m) {
  ctx.save();
  ctx.translate(m.x, m.y);
  ctx.rotate(m.rot);

  const glow = ctx.createRadialGradient(-m.r * 0.3, -m.r * 0.35, 1, 0, 0, m.r * 1.25);
  glow.addColorStop(0, `hsla(${m.hue}, 95%, 73%, 0.95)`);
  glow.addColorStop(0.35, `hsla(${m.hue + 10}, 92%, 58%, 0.9)`);
  glow.addColorStop(1, `hsla(${m.hue + 20}, 88%, 36%, 0.95)`);
  ctx.fillStyle = glow;

  drawRoundedMeteorPath(m);
  ctx.fill();

  // stable crater details (no bouncing mini-balls)
  ctx.globalAlpha = 0.22;
  ctx.fillStyle = '#2f1b14';
  for (let i = 0; i < 3; i++) {
    const s = m.craterSeed[i];
    const angle = s * Math.PI * 2;
    const dist = m.r * (0.15 + (i * 0.15));
    const cx = Math.cos(angle) * dist;
    const cy = Math.sin(angle) * dist;
    const rr = m.r * (0.14 + i * 0.03);
    ctx.beginPath();
    ctx.ellipse(cx, cy, rr, rr * 0.75, angle * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  for (let i = 0; i < 95; i++) {
    const x = (i * 97) % W;
    const y = ((i * 53 + performance.now() * 0.02 * (1 + i % 3)) % H);
    ctx.fillStyle = `rgba(255,255,255,${0.15 + (i % 5) * 0.09})`;
    ctx.fillRect(x, y, 2, 2);
  }

  if (invincibleTimer <= 0 || Math.floor(invincibleTimer * 12) % 2 === 0) {
    drawShip();
  }

  for (const m of meteors) drawMeteor(m);

  for (const p of particles) {
    const alpha = 1 - p.age / p.life;
    ctx.fillStyle = p.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
    if (!ctx.fillStyle.includes('rgba')) ctx.fillStyle = `rgba(255,170,120,${alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }

  const level = 1 + Math.floor(t / 10);
  ctx.fillStyle = 'rgba(255,255,255,.75)';
  ctx.font = '14px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText(`Difficulty Lv.${level}`, 12, 22);

  if (extraLifeBannerTimer > 0) {
    const a = Math.min(1, extraLifeBannerTimer / 0.25);
    ctx.fillStyle = `rgba(157,255,190,${0.2 + a * 0.35})`;
    ctx.fillRect(W / 2 - 170, 16, 340, 42);
    ctx.strokeStyle = `rgba(157,255,190,${0.6 + a * 0.3})`;
    ctx.strokeRect(W / 2 - 170, 16, 340, 42);
    ctx.fillStyle = `rgba(215,255,228,${0.8 + a * 0.2})`;
    ctx.font = 'bold 22px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('✨ Extra Life Gained! +1', W / 2, 45);
  }

  if (!running) {
    ctx.fillStyle = 'rgba(0,0,0,.56)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 44px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over', W / 2, H / 2 - 14);
    ctx.font = '24px system-ui';
    ctx.fillText(`Score: ${Math.floor(score)}  |  Press Restart`, W / 2, H / 2 + 28);
  }
}

let last = performance.now();
function loop(now) {
  const dt = Math.min(0.033, (now - last) / 1000);
  last = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'arrowleft') keys.add('ArrowLeft');
  else if (k === 'arrowright') keys.add('ArrowRight');
  else keys.add(k);
});
addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (k === 'arrowleft') keys.delete('ArrowLeft');
  else if (k === 'arrowright') keys.delete('ArrowRight');
  else keys.delete(k);
});
restartBtn.onclick = reset;
</script>
</body>
</html>
