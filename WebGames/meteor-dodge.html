<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteor Dodge</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:#070b18; color:#fff; display:grid; place-items:center; min-height:100vh; }
    .wrap { width:min(900px,95vw); }
    h1 { margin:.2rem 0; }
    p { opacity:.85; margin:.2rem 0 .8rem; }
    canvas { width:100%; max-width:900px; height:auto; border:1px solid #2b335c; border-radius:12px; background:linear-gradient(#0b1130,#090d1f); display:block; }
    .row { display:flex; justify-content:space-between; align-items:center; margin-top:10px; gap:10px; flex-wrap:wrap; }
    .pill { padding:6px 10px; border:1px solid #2b335c; border-radius:999px; background:#111735; }
    button { background:#4f7cff; color:#fff; border:0; border-radius:10px; padding:8px 12px; cursor:pointer; font-weight:700; }
    .front-page {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, rgba(94,120,255,0.25), transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(255,98,76,0.2), transparent 45%),
                  rgba(2, 6, 16, 0.92);
      backdrop-filter: blur(4px);
      z-index: 20;
    }
    .front-page.hidden { display: none; }
    .front-card {
      width: min(860px, 92vw);
      border: 1px solid #39457d;
      border-radius: 18px;
      padding: 20px;
      background: linear-gradient(165deg, rgba(23,33,66,0.95), rgba(12,18,40,0.95));
      box-shadow: 0 30px 70px rgba(0,0,0,.5);
    }
    .thumb {
      position: relative;
      height: min(45vh, 320px);
      border-radius: 14px;
      border: 1px solid rgba(117,136,219,0.5);
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.2) 0 1px, transparent 2px),
        radial-gradient(circle at 65% 32%, rgba(255,255,255,0.16) 0 1px, transparent 2px),
        radial-gradient(circle at 82% 70%, rgba(255,255,255,0.14) 0 1px, transparent 2px),
        linear-gradient(180deg, #111a3d, #090f28 60%, #060b18);
      overflow: hidden;
      margin-bottom: 14px;
      box-shadow: inset 0 -30px 80px rgba(0,0,0,.35);
    }
    .thumb::before {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -58%;
      width: 112%;
      aspect-ratio: 1 / 1;
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 42% 36%, rgba(255,255,255,0.55), rgba(255,255,255,0) 26%),
        radial-gradient(circle at 58% 44%, rgba(44,161,92,0.95), rgba(44,161,92,0) 23%),
        radial-gradient(circle at 36% 60%, rgba(76,188,118,0.9), rgba(76,188,118,0) 24%),
        radial-gradient(circle at 66% 64%, rgba(77,138,217,0.9), rgba(77,138,217,0) 30%),
        radial-gradient(circle at 50% 50%, #4a9ae0 0%, #2d6cbc 56%, #173f84 100%);
      box-shadow: 0 0 35px rgba(120,200,255,0.35);
    }
    .thumb::after {
      content: '☄️   ☄️   ⚡';
      position: absolute;
      top: 16%;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(22px, 4vw, 38px);
      letter-spacing: .18em;
      text-shadow: 0 6px 20px rgba(0,0,0,.6);
      opacity: 0.95;
    }
    .thumb-title {
      position: absolute;
      left: 50%;
      bottom: 12%;
      transform: translateX(-50%);
      font-size: clamp(20px, 4vw, 34px);
      font-weight: 800;
      letter-spacing: .08em;
      text-shadow: 0 8px 24px rgba(0,0,0,.65);
      color: #dff1ff;
      white-space: nowrap;
    }
    .front-row { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
    .start-btn { background: linear-gradient(135deg, #5f88ff, #47b2ff); font-size: 1rem; padding: 10px 18px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>☄️ Meteor Dodge</h1>
    <p>← → / A D to move. Space to use slow wave (charges over time).</p>
    <canvas id="game" width="900" height="520"></canvas>
    <div class="row">
      <div class="pill">Score: <span id="score">0</span></div>
      <div class="pill">Best: <span id="best">0</span></div>
      <div class="pill">Lives: <span id="lives">2</span></div>
      <div class="pill">Wave: <span id="wave">0%</span></div>
      <button id="lowDetail">Low Detail (L): Off</button>
      <button id="hitboxes">Hitboxes (H): Off</button>
      <button id="fullscreen">Fullscreen</button>
      <button id="restart">Restart</button>
    </div>
  </main>

  <div id="frontPage" class="front-page">
    <div class="front-card">
      <div class="thumb"><div class="thumb-title">METEOR DODGE</div></div>
      <div class="front-row">
        <div>
          <h2 style="margin:.1rem 0;">Meteor Dodge</h2>
          <p style="margin:.2rem 0;opacity:.85;">Dodge meteors, survive laser storms, and smash your high score.</p>
        </div>
        <button id="startGame" class="start-btn">Start Game</button>
      </div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const livesEl = document.getElementById('lives');
  const waveEl = document.getElementById('wave');
  const lowDetailBtn = document.getElementById('lowDetail');
  const hitboxesBtn = document.getElementById('hitboxes');
  const fullscreenBtn = document.getElementById('fullscreen');
  const restartBtn = document.getElementById('restart');
  const frontPage = document.getElementById('frontPage');
  const startGameBtn = document.getElementById('startGame');

  const W = canvas.width, H = canvas.height;
  const MAX_LIVES = 4;
  const keys = new Set();

  let running, score, lives, invincible, t, bgY;
  let best = Number(localStorage.getItem('meteor_dodge_best') || 0);
  let meteors, lasers, bossMissiles, particles, flames;
  let spawnTimer, laserTimer;
  let extraLifeMsg, nextLifeScore;
  let waveCharge, waveActive, waveRing;
  let shakeT, shakeP, shakeDur;
  let boss, bossNextScore, bossWaveMsg;
  let showHitboxes, lowDetail, gameStarted;

  const player = { x: W/2, y: H-52, speed: 420, tilt:0, tiltTarget:0 };
  const earthIntro = { active: true, timer: 0, duration: 42 };


  const rand = (a,b)=>Math.random()*(b-a)+a;
  const randInt = (a,b)=>Math.floor(rand(a,b));

  function reset() {
    running = gameStarted;
    score = 0;
    lives = 2;
    invincible = 0;
    t = 0;
    bgY = 0;

    meteors = [];
    lasers = [];
    bossMissiles = [];
    particles = [];
    flames = [];

    spawnTimer = 0;
    laserTimer = 0;

    extraLifeMsg = 0;
    nextLifeScore = Math.floor(rand(500,601));

    waveCharge = 0;
    waveActive = 0;
    waveRing = 0;

    shakeT = 0;
    shakeP = 0;
    shakeDur = 0;

    boss = null;
    bossNextScore = randInt(1500, 2001);
    bossWaveMsg = 0;

    showHitboxes = false;
    hitboxesBtn.textContent = 'Hitboxes (H): Off';

    lowDetail = false;
    lowDetailBtn.textContent = 'Low Detail (L): Off';

    player.x = W/2;
    player.tilt = 0;
    player.tiltTarget = 0;

    earthIntro.active = true;
    earthIntro.timer = 0;

    scoreEl.textContent = '0';
    bestEl.textContent = best;
    livesEl.textContent = '2';
    waveEl.textContent = '0%';
  }

  function startGame() {
    gameStarted = true;
    frontPage.classList.add('hidden');
    reset();
  }

  function spawnMeteor() {
    const r = rand(10,24);
    const points = [];
    const count = 10;
    for (let i = 0; i < count; i++) {
      const a = (i / count) * Math.PI * 2;
      const rr = r * rand(0.86, 1.05);
      points.push({ a, rr });
    }
    meteors.push({
      x: rand(r, W-r),
      y: -30,
      r,
      vx: rand(-35,35),
      vy: rand(120,220) + Math.min(320, t*15),
      rot: rand(0, Math.PI*2),
      spin: rand(-1.4,1.4),
      hue: rand(12, 36),
      points,
      trail: []
    });
  }

  function spawnBoss() {
    const level = 1 + Math.floor(score / 2200);
    const earlyEase = level <= 2 ? 0.72 : 1;
    const hp = Math.min(320, (105 + level * 26) * earlyEase);
    boss = {
      x: W / 2,
      y: -110,
      r: 82,
      hp,
      hpMax: hp,
      level,
      enterV: 68,
      dir: Math.random() > 0.5 ? 1 : -1,
      speed: (85 + level * 8) * earlyEase,
      hitFlash: 0,
      attackTimer: 0,
      attackGap: level <= 2 ? rand(1.35, 2.2) : rand(1.0, 2.0),
      minGap: level <= 2 ? Math.max(0.62, 1.18 - level * 0.08) : Math.max(0.42, 1.02 - level * 0.08),
      volley: level <= 2 ? 1 : Math.min(4, 1 + Math.floor(level / 2))
    };
    meteors.length = 0;
    bossWaveMsg = 3.2;
  }

  function hitRectCircle(rx, ry, rw, rh, cx, cy, cr) {
    const nx = Math.max(rx, Math.min(cx, rx + rw));
    const ny = Math.max(ry, Math.min(cy, ry + rh));
    const dx = cx - nx, dy = cy - ny;
    return dx*dx + dy*dy <= cr*cr;
  }

  function hitPlayer() {
    if (invincible > 0) return;
    lives--;
    livesEl.textContent = String(lives);
    invincible = 1.0;
    if (lives <= 0) {
      shakeDur = 5.0;
      shakeT = 5.0;
      shakeP = 12;
      running = false;
    } else {
      shakeDur = 2.0;
      shakeT = 2.0;
      shakeP = 10;
    }
    for (let i=0;i<12;i++) particles.push({x:player.x,y:player.y,vx:rand(-120,120),vy:rand(-120,120),a:0,l:rand(.2,.45),s:rand(2,5),c:'rgba(110,203,255,1)'});
  }

  function awardLives(scoreInt) {
    while (scoreInt >= nextLifeScore) {
      if (lives < MAX_LIVES) {
        lives++;
        livesEl.textContent = String(lives);
        extraLifeMsg = 1.8;
      }
      nextLifeScore += Math.floor(rand(500,601));
    }
  }

  function triggerWave() {
    if (waveCharge < 100 || waveActive > 0) return;
    waveCharge = 0;
    waveActive = 3.4;
    waveRing = 0.8;

    if (boss) {
      const d = Math.hypot(player.x - boss.x, player.y - boss.y);
      if (d <= boss.r + 220) {
        boss.hp = Math.max(0, boss.hp - 34);
        boss.hitFlash = 0.22;
        for (let i=0;i<18;i++) particles.push({x:boss.x,y:boss.y,vx:rand(-160,160),vy:rand(-160,160),a:0,l:rand(.2,.5),s:rand(2,5),c:'rgba(255,198,110,1)'});
      }
    }
  }

  function update(dt) {
    if (lowDetail) {
      shakeT = 0;
      shakeP = 0;
    } else if (shakeT > 0) {
      shakeT -= dt;
      const tNorm = Math.max(0, shakeT / Math.max(0.001, shakeDur));
      shakeP = 12 * tNorm;
      if (shakeT <= 0) {
        shakeT = 0;
        shakeP = 0;
      }
    } else {
      shakeP = 0;
    }

    if (!gameStarted || !running) return;
    t += dt;
    bgY += dt * 30;
    if (earthIntro.active) {
      earthIntro.timer += dt;
      if (earthIntro.timer >= earthIntro.duration) earthIntro.active = false;
    }

    if (invincible > 0) invincible -= dt;
    if (extraLifeMsg > 0) extraLifeMsg -= dt;
    if (waveActive > 0) waveActive -= dt;
    if (waveRing > 0) waveRing -= dt;
    if (bossWaveMsg > 0) bossWaveMsg -= dt;

    const laserActiveNow = lasers.length > 0;
    const waveChargeRate = laserActiveNow ? 4 : 2; // normal: 1%/0.5s, with lasers: 2%/0.5s
    waveCharge = Math.min(100, waveCharge + dt * waveChargeRate);
    waveEl.textContent = `${Math.floor(waveCharge)}%`;

    let dir = 0;
    if (keys.has('ArrowLeft') || keys.has('a')) dir -= 1;
    if (keys.has('ArrowRight') || keys.has('d')) dir += 1;
    player.x += dir * player.speed * dt;
    player.x = Math.max(24, Math.min(W-24, player.x));
    player.tiltTarget = dir * 0.28;
    player.tilt += (player.tiltTarget - player.tilt) * Math.min(1, dt * 11);

    // flame trail
    if (!lowDetail) {
      for (let i=0;i<2;i++) flames.push({x:player.x+rand(-4,4),y:player.y+14,vx:rand(-20,20),vy:rand(70,130),a:0,l:rand(.2,.45),s:rand(3,6)});
    }

    const slow = waveActive > 0 ? 0.58 : 1;
    const spawnMul = waveActive > 0 ? 0.72 : 1;
    const scoreInt = Math.floor(score);

    if (!boss && scoreInt >= bossNextScore) {
      spawnBoss();
      bossNextScore += randInt(1500, 2001);
    }

    if (!boss) {
      spawnTimer += dt;
      const gap = Math.max(0.16, (0.92 - t*0.015) / spawnMul);
      while (spawnTimer >= gap) {
        spawnTimer -= gap;
        spawnMeteor();
        if (Math.random() < (Math.min(0.42, 0.05 + t*0.0028) * spawnMul)) spawnMeteor();
      }
    }

    for (const m of meteors) {
      m.y += m.vy * dt * slow;
      m.x += m.vx * dt * slow;
      m.rot += m.spin * dt * slow;
      if (!lowDetail) {
        m.trail.push({ x: m.x, y: m.y, r: m.r * 0.95 });
        if (m.trail.length > 10) m.trail.shift();
      } else if (m.trail.length) {
        m.trail.length = 0;
      }
      if (m.x < -m.r) m.x = W + m.r;
      if (m.x > W + m.r) m.x = -m.r;
      if (hitRectCircle(player.x-18, player.y-20, 36, 40, m.x, m.y, m.r*0.9)) {
        hitPlayer();
        m.y = H + 100;
      }
    }
    meteors = meteors.filter(m => m.y < H + 60);

    if (boss) {
      if (boss.hitFlash > 0) boss.hitFlash -= dt;
      if (boss.y < 102) boss.y += boss.enterV * dt;
      else {
        boss.x += boss.dir * boss.speed * dt;
        if (boss.x < boss.r + 20 || boss.x > W - boss.r - 20) boss.dir *= -1;
      }

      boss.attackTimer += dt;
      while (boss.attackTimer >= boss.attackGap) {
        boss.attackTimer -= boss.attackGap;
        for (let i = 0; i < boss.volley; i++) {
          const useLaser = Math.random() < (0.52 + Math.min(0.22, boss.level * 0.03));
          if (useLaser) {
            const lx = boss.x + rand(-boss.r * 0.55, boss.r * 0.55);
            lasers.push({ x: Math.max(30, Math.min(W-30, lx)), warn: Math.max(0.3, 0.75 - boss.level * 0.04), fire: 1.6 + boss.level * 0.1, w: 14 + boss.level * 1.2 });
          } else {
            bossMissiles.push({
              x: boss.x + rand(-boss.r * 0.5, boss.r * 0.5),
              y: boss.y + boss.r * 0.72,
              r: 10 + Math.min(6, boss.level),
              vx: rand(-85, 85),
              vy: 165 + boss.level * 18,
              life: 8
            });
          }
        }
        const ramp = boss.level <= 2 ? 0.018 : (0.03 + boss.level * 0.003);
        boss.attackGap = Math.max(boss.minGap, boss.attackGap - ramp);
      }

      if (hitRectCircle(player.x-18, player.y-20, 36, 40, boss.x, boss.y, boss.r*0.82)) hitPlayer();
      if (boss.hp <= 0) {
        for (let i=0;i<44;i++) particles.push({x:boss.x,y:boss.y,vx:rand(-230,230),vy:rand(-230,230),a:0,l:rand(.25,.8),s:rand(2,7),c:'rgba(255,180,90,1)'});
        score += 350 + boss.level * 60;
        boss = null;
        bossWaveMsg = 1.2;
      }
    }

    if (!boss && scoreInt >= 1000) {
      laserTimer += dt;
      while (laserTimer >= 3) {
        laserTimer -= 3;
        lasers.push({ x: rand(70, W-70), warn: 0.9, fire: 2.1, w: 14 });
      }
    }

    for (const l of lasers) {
      if (l.warn > 0) l.warn -= dt; else l.fire -= dt;
      if (l.warn <= 0 && l.fire > 0) {
        if (Math.abs(player.x - l.x) <= (l.w/2 + 14)) hitPlayer();
      }
    }
    lasers = lasers.filter(l => l.fire > 0);

    for (const m of bossMissiles) {
      m.x += m.vx * dt;
      m.y += m.vy * dt;
      m.life -= dt;
      if (m.x < m.r || m.x > W - m.r) m.vx *= -1;
      if (hitRectCircle(player.x-18, player.y-20, 36, 40, m.x, m.y, m.r)) {
        hitPlayer();
        m.life = -1;
      }
    }
    bossMissiles = bossMissiles.filter(m => m.y < H + 40 && m.life > 0);

    for (const p of particles) { p.a += dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vx*=0.98; p.vy*=0.98; }
    particles = particles.filter(p => p.a < p.l);

    for (const f of flames) { f.a += dt; f.x += f.vx*dt; f.y += f.vy*dt; f.vx*=0.96; f.vy*=0.96; }
    flames = flames.filter(f => f.a < f.l);

    score += dt * 10;
    const sInt = Math.floor(score);
    scoreEl.textContent = String(sInt);
    awardLives(sInt);
    if (sInt > best) { best = sInt; bestEl.textContent = String(best); localStorage.setItem('meteor_dodge_best', String(best)); }
  }

  function drawBackground() {
    const mapOffsetY = bgY;
    const mapOffsetX = bgY * 0.08;

    for (let i=0;i<95;i++) {
      const x = ((i*97 + mapOffsetX*(0.4 + (i%3)*0.15))%(W+10)) - 5;
      const y = ((i*53 + mapOffsetY*(0.6 + (i%3)*0.22))%(H+10)) - 5;
      ctx.fillStyle = `rgba(255,255,255,${0.14 + (i%5)*0.08})`;
      ctx.fillRect(x,y,2,2);
    }

    if (gameStarted) {
      const orbitDrift = Math.sin(t * 0.18) * 24;
      const intro = earthIntro.active ? Math.min(1, earthIntro.timer / earthIntro.duration) : 1;
      const eased = 1 - Math.pow(1 - intro, 2.2);
      const postIntroFall = Math.max(0, t - earthIntro.duration) * (H * 0.06);
      const radius = H * 0.72;
      const earthX = W * 0.5 + orbitDrift;
      const earthY = (H * 0.72) + eased * (H * 0.62) + postIntroFall;

      const g = ctx.createRadialGradient(
        earthX - radius * 0.34,
        earthY - radius * 0.46,
        1,
        earthX,
        earthY,
        radius
      );
      g.addColorStop(0, 'rgba(190,230,255,0.96)');
      g.addColorStop(0.34, 'rgba(78,156,226,0.96)');
      g.addColorStop(0.74, 'rgba(34,91,170,0.95)');
      g.addColorStop(1, 'rgba(10,42,92,0.98)');
      ctx.globalAlpha = 0.95;
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(earthX, earthY, radius, 0, Math.PI * 2);
      ctx.fill();

      // continents (stylized but closer to Earth look)
      const continents = [
        { ox: -0.46, oy: -0.18, rx: 0.15, ry: 0.1, rot: -0.36, rough: [1, 0.84, 1.12, 0.9, 1.06, 0.8, 1.1] },
        { ox: -0.12, oy: -0.34, rx: 0.11, ry: 0.07, rot: 0.1, rough: [1, 1.08, 0.82, 1.05, 0.9, 1.12, 0.86] },
        { ox: 0.22, oy: -0.2, rx: 0.14, ry: 0.09, rot: 0.52, rough: [1, 0.88, 1.1, 0.84, 1.06, 0.9, 1.04] },
        { ox: 0.5, oy: -0.02, rx: 0.1, ry: 0.065, rot: -0.16, rough: [1, 1.1, 0.86, 1.04, 0.82, 1.08, 0.92] },
        { ox: -0.3, oy: 0.12, rx: 0.13, ry: 0.085, rot: -0.08, rough: [1, 0.86, 1.14, 0.82, 1.05, 0.9, 1.02] },
        { ox: 0.02, oy: 0.24, rx: 0.14, ry: 0.085, rot: 0.24, rough: [1, 1.12, 0.88, 1.05, 0.86, 1.08, 0.9] },
        { ox: 0.34, oy: 0.28, rx: 0.09, ry: 0.06, rot: 0.16, rough: [1, 0.9, 1.08, 0.84, 1.12, 0.88, 1.04] },
        { ox: -0.56, oy: 0.3, rx: 0.06, ry: 0.04, rot: -0.32, rough: [1, 1.1, 0.85, 1.08, 0.9, 1.06] },
        { ox: 0.6, oy: -0.3, rx: 0.055, ry: 0.035, rot: 0.18, rough: [1, 0.86, 1.12, 0.9, 1.04, 0.88] }
      ];
      ctx.save();
      ctx.beginPath();
      ctx.arc(earthX, earthY, radius, 0, Math.PI * 2);
      ctx.clip();
      for (const c of continents) {
        ctx.save();
        ctx.translate(earthX + radius * c.ox, earthY + radius * c.oy);
        ctx.rotate(c.rot + Math.sin(t * 0.09 + c.ox * 2.2) * 0.02);
        const cg = ctx.createRadialGradient(0, 0, 1, 0, 0, radius * c.rx * 1.25);
        cg.addColorStop(0, 'rgba(110,194,108,0.95)');
        cg.addColorStop(1, 'rgba(42,122,70,0.92)');
        ctx.fillStyle = cg;
        ctx.beginPath();
        const n = c.rough.length;
        for (let i = 0; i < n; i++) {
          const a = (i / n) * Math.PI * 2;
          const rr = c.rough[i];
          const px = Math.cos(a) * radius * c.rx * rr;
          const py = Math.sin(a) * radius * c.ry * rr;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      // cloud swirls + cloud patches
      ctx.globalAlpha = 0.5;
      ctx.strokeStyle = 'rgba(255,255,255,0.98)';
      ctx.lineWidth = Math.max(2.5, radius * 0.032);
      ctx.beginPath();
      ctx.arc(earthX - radius * 0.06, earthY - radius * 0.02, radius * 0.74, 0.45, 2.7);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(earthX + radius * 0.18, earthY + radius * 0.08, radius * 0.5, 0.18, 2.46);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(earthX - radius * 0.22, earthY + radius * 0.2, radius * 0.34, 5.2, 1.7);
      ctx.stroke();

      const cloudPatches = [
        { ox: -0.32, oy: -0.24, rx: 0.16, ry: 0.07, rot: 0.3, a: 0.48 },
        { ox: -0.02, oy: -0.12, rx: 0.2, ry: 0.08, rot: -0.18, a: 0.44 },
        { ox: 0.28, oy: -0.05, rx: 0.14, ry: 0.06, rot: 0.14, a: 0.5 },
        { ox: -0.18, oy: 0.08, rx: 0.17, ry: 0.07, rot: -0.34, a: 0.42 },
        { ox: 0.08, oy: 0.22, rx: 0.19, ry: 0.08, rot: 0.2, a: 0.46 },
        { ox: 0.36, oy: 0.18, rx: 0.12, ry: 0.05, rot: -0.1, a: 0.38 }
      ];
      for (const cl of cloudPatches) {
        ctx.save();
        ctx.translate(earthX + radius * cl.ox, earthY + radius * cl.oy);
        ctx.rotate(cl.rot + Math.sin(t * 0.12 + cl.ox * 4) * 0.02);
        const cg = ctx.createRadialGradient(0, 0, 1, 0, 0, radius * cl.rx * 1.4);
        cg.addColorStop(0, `rgba(255,255,255,${cl.a})`);
        cg.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = cg;
        ctx.beginPath();
        ctx.ellipse(0, 0, radius * cl.rx, radius * cl.ry, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();

      // atmosphere rim
      ctx.globalAlpha = 0.3;
      ctx.strokeStyle = 'rgba(198,236,255,0.98)';
      ctx.lineWidth = Math.max(3, radius * 0.043);
      ctx.beginPath();
      ctx.arc(earthX, earthY, radius * 1.02, Math.PI * 0.97, Math.PI * 1.98);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  function drawRocket() {
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.tilt);

    const flameLen = 18 + Math.sin(performance.now()*0.03)*6;
    const fg = ctx.createLinearGradient(0,12,0,12+flameLen);
    fg.addColorStop(0,'rgba(255,244,170,0.95)');
    fg.addColorStop(0.45,'rgba(255,156,74,0.9)');
    fg.addColorStop(1,'rgba(255,70,50,0)');
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.moveTo(-7,12); ctx.quadraticCurveTo(0,12+flameLen,7,12); ctx.closePath(); ctx.fill();

    const body = ctx.createLinearGradient(-14,-20,14,20);
    body.addColorStop(0,'#d8e8ff'); body.addColorStop(0.55,'#89b8ff'); body.addColorStop(1,'#4f7fd0');
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.moveTo(0,-24); ctx.quadraticCurveTo(14,-8,10,14); ctx.quadraticCurveTo(0,20,-10,14); ctx.quadraticCurveTo(-14,-8,0,-24);
    ctx.fill();

    ctx.fillStyle='#ff7f6a'; ctx.beginPath(); ctx.moveTo(0,-28); ctx.lineTo(6,-20); ctx.lineTo(-6,-20); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#dff8ff'; ctx.beginPath(); ctx.arc(0,-7,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2a5395';
    ctx.beginPath(); ctx.moveTo(-10,10); ctx.lineTo(-18,17); ctx.lineTo(-8,16); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(10,10); ctx.lineTo(18,17); ctx.lineTo(8,16); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function draw() {
    if (typeof ctx.resetTransform === 'function') ctx.resetTransform();
    else ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,W,H);

    const sx = shakeP > 0.1 ? rand(-shakeP, shakeP) : 0;
    const sy = shakeP > 0.1 ? rand(-shakeP, shakeP) : 0;

    ctx.save();
    ctx.translate(sx, sy);

    if (!lowDetail) drawBackground();

    for (const l of lasers) {
      if (l.warn > 0) {
        ctx.strokeStyle='rgba(255,90,90,0.55)'; ctx.lineWidth=2; ctx.setLineDash([8,8]);
        ctx.beginPath(); ctx.moveTo(l.x,0); ctx.lineTo(l.x,H); ctx.stroke(); ctx.setLineDash([]);
      } else {
        const surge = lowDetail ? 1 : (0.78 + Math.sin(performance.now() * 0.024 + l.x * 0.055) * 0.22);
        const width = l.w * surge;
        const beam = ctx.createLinearGradient(l.x,0,l.x,H);
        beam.addColorStop(0,`rgba(255,70,70,${0.12 + surge*0.08})`);
        beam.addColorStop(0.5,`rgba(255,70,70,${0.72 + surge*0.24})`);
        beam.addColorStop(1,`rgba(255,70,70,${0.12 + surge*0.08})`);
        ctx.strokeStyle=beam; ctx.lineWidth=width;
        ctx.beginPath(); ctx.moveTo(l.x,0); ctx.lineTo(l.x,H); ctx.stroke();

        if (!lowDetail) {
          const glowW = l.w * (2.1 + surge * 0.8);
          const glow = ctx.createLinearGradient(l.x,0,l.x,H);
          glow.addColorStop(0,'rgba(255,95,95,0)');
          glow.addColorStop(0.5,`rgba(255,85,85,${0.26 + surge*0.18})`);
          glow.addColorStop(1,'rgba(255,95,95,0)');
          ctx.strokeStyle = glow;
          ctx.lineWidth = glowW;
          ctx.beginPath(); ctx.moveTo(l.x,0); ctx.lineTo(l.x,H); ctx.stroke();
        }
      }
    }

    if (!lowDetail) {
      for (const f of flames) {
        const a = 1 - f.a/f.l;
        const g = ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.s*2);
        g.addColorStop(0, `rgba(255,230,140,${0.75*a})`);
        g.addColorStop(0.6, `rgba(255,120,60,${0.6*a})`);
        g.addColorStop(1, 'rgba(255,60,40,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(f.x,f.y,f.s*(0.7+a),0,Math.PI*2); ctx.fill();
      }
    }

    if (invincible <= 0 || Math.floor(invincible*12)%2===0) drawRocket();

    if (!lowDetail) {
      for (const m of meteors) {
        for (let i = 0; i < m.trail.length; i++) {
          const tp = m.trail[i];
          const a = (i + 1) / m.trail.length;
          const g = ctx.createRadialGradient(tp.x, tp.y, 0, tp.x, tp.y, tp.r * (0.7 + a));
          g.addColorStop(0, `rgba(255,220,120,${a * 0.26})`);
          g.addColorStop(0.6, `rgba(255,150,80,${a * 0.22})`);
          g.addColorStop(1, 'rgba(255,110,70,0)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(tp.x, tp.y, tp.r * (0.45 + a * 0.75), 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    for (const m of meteors) {
      ctx.save(); ctx.translate(m.x,m.y); ctx.rotate(m.rot);
      const g = ctx.createRadialGradient(-m.r*0.3,-m.r*0.35,1,0,0,m.r*1.25);
      g.addColorStop(0,`hsla(${m.hue},95%,73%,0.95)`); g.addColorStop(0.35,`hsla(${m.hue+10},92%,58%,0.9)`); g.addColorStop(1,`hsla(${m.hue+20},88%,36%,0.95)`);
      ctx.fillStyle = g;

      const pts = m.points.map(p => ({ x: Math.cos(p.a) * p.rr, y: Math.sin(p.a) * p.rr }));
      ctx.beginPath();
      for (let i = 0; i < pts.length; i++) {
        const p0 = pts[i], p1 = pts[(i + 1) % pts.length];
        const mx = (p0.x + p1.x) * 0.5, my = (p0.y + p1.y) * 0.5;
        if (i === 0) ctx.moveTo(mx, my);
        else ctx.quadraticCurveTo(p0.x, p0.y, mx, my);
      }
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    for (const m of bossMissiles) {
      const mg = ctx.createRadialGradient(m.x - m.r*0.35, m.y - m.r*0.35, 1, m.x, m.y, m.r*1.2);
      mg.addColorStop(0, 'rgba(255,235,185,0.95)');
      mg.addColorStop(0.55, 'rgba(255,140,86,0.95)');
      mg.addColorStop(1, 'rgba(165,58,36,0.98)');
      ctx.fillStyle = mg;
      ctx.beginPath();
      ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,245,220,0.85)';
      ctx.beginPath();
      ctx.arc(m.x - m.r*0.25, m.y - m.r*0.28, m.r*0.26, 0, Math.PI*2);
      ctx.fill();
    }

    if (boss) {
      ctx.save();
      ctx.translate(boss.x, boss.y);

      // fighter-jet-ish UFO body
      const hull = ctx.createLinearGradient(-boss.r,0,boss.r,0);
      hull.addColorStop(0, boss.hitFlash > 0 ? 'rgba(255,255,255,0.95)' : 'rgba(164,182,214,0.95)');
      hull.addColorStop(0.5, boss.hitFlash > 0 ? 'rgba(255,248,222,0.98)' : 'rgba(103,132,178,0.98)');
      hull.addColorStop(1, boss.hitFlash > 0 ? 'rgba(255,255,255,0.95)' : 'rgba(75,96,136,0.95)');
      ctx.fillStyle = hull;
      ctx.beginPath();
      ctx.moveTo(-boss.r*0.98, boss.r*0.08);
      ctx.quadraticCurveTo(-boss.r*0.45, -boss.r*0.5, 0, -boss.r*0.6);
      ctx.quadraticCurveTo(boss.r*0.45, -boss.r*0.5, boss.r*0.98, boss.r*0.08);
      ctx.quadraticCurveTo(boss.r*0.42, boss.r*0.5, 0, boss.r*0.4);
      ctx.quadraticCurveTo(-boss.r*0.42, boss.r*0.5, -boss.r*0.98, boss.r*0.08);
      ctx.closePath();
      ctx.fill();

      // canopy
      const canopy = ctx.createRadialGradient(-boss.r*0.08,-boss.r*0.34,1,0,-boss.r*0.2,boss.r*0.5);
      canopy.addColorStop(0, 'rgba(214,245,255,0.95)');
      canopy.addColorStop(1, 'rgba(104,175,235,0.35)');
      ctx.fillStyle = canopy;
      ctx.beginPath();
      ctx.ellipse(0, -boss.r*0.2, boss.r*0.38, boss.r*0.24, 0, Math.PI, 0, true);
      ctx.closePath();
      ctx.fill();

      // wings
      ctx.fillStyle = 'rgba(70,94,140,0.9)';
      ctx.beginPath();
      ctx.moveTo(-boss.r*0.3, -boss.r*0.02);
      ctx.lineTo(-boss.r*1.16, boss.r*0.26);
      ctx.lineTo(-boss.r*0.4, boss.r*0.18);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(boss.r*0.3, -boss.r*0.02);
      ctx.lineTo(boss.r*1.16, boss.r*0.26);
      ctx.lineTo(boss.r*0.4, boss.r*0.18);
      ctx.closePath();
      ctx.fill();

      // nose + engine glow
      ctx.fillStyle = 'rgba(235,245,255,0.95)';
      ctx.beginPath();
      ctx.ellipse(0, -boss.r*0.54, boss.r*0.15, boss.r*0.08, 0, 0, Math.PI*2);
      ctx.fill();

      const eng = ctx.createRadialGradient(0,boss.r*0.18,1,0,boss.r*0.18,boss.r*0.44);
      eng.addColorStop(0, 'rgba(120,225,255,0.9)');
      eng.addColorStop(1, 'rgba(40,140,220,0)');
      ctx.fillStyle = eng;
      ctx.beginPath();
      ctx.ellipse(0, boss.r*0.2, boss.r*0.5, boss.r*0.24, 0, 0, Math.PI*2);
      ctx.fill();

      // trim
      ctx.strokeStyle = 'rgba(230,244,255,0.45)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-boss.r*0.68, boss.r*0.05);
      ctx.quadraticCurveTo(0, -boss.r*0.34, boss.r*0.68, boss.r*0.05);
      ctx.stroke();

      ctx.restore();

      const barW = 260;
      const barX = W/2 - barW/2;
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(barX, 14, barW, 14);
      ctx.fillStyle = 'rgba(255,112,88,0.95)';
      ctx.fillRect(barX, 14, barW * (boss.hp / boss.hpMax), 14);
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.strokeRect(barX, 14, barW, 14);
      ctx.fillStyle = 'rgba(255,230,215,0.95)';
      ctx.font = 'bold 12px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(`BOSS CORE Lv.${boss.level}`, W/2, 26);
    }

    for (const p of particles) {
      const a = 1 - p.a/p.l;
      ctx.fillStyle = `rgba(110,203,255,${a})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.s*a,0,Math.PI*2); ctx.fill();
    }

    if (waveRing > 0) {
      const prog = 1 - waveRing/0.8;
      const r = prog * 460;
      ctx.strokeStyle = `rgba(110,203,255,${0.8 - prog*0.75})`;
      ctx.lineWidth = 8 - prog*5;
      ctx.beginPath(); ctx.arc(player.x,player.y,r,0,Math.PI*2); ctx.stroke();
    }

    const level = 1 + Math.floor(t/10);
    ctx.fillStyle='rgba(255,255,255,.75)'; ctx.font='14px system-ui'; ctx.textAlign='left';
    ctx.fillText(`Difficulty Lv.${level}`,12,22);
    ctx.fillStyle='rgba(255,255,255,.65)';
    ctx.fillText(`Hitboxes: ${showHitboxes ? 'On' : 'Off'} (H)`, 12, 42);

    if (waveActive > 0) { ctx.fillStyle='rgba(160,220,255,0.95)'; ctx.font='bold 20px system-ui'; ctx.textAlign='center'; ctx.fillText('🌊 Slow Wave Activated!', W/2, 80); }
    if (bossWaveMsg > 0) {
      const p = Math.min(1, bossWaveMsg / 0.45);
      ctx.fillStyle = `rgba(255,130,105,${0.22 + p*0.3})`;
      ctx.fillRect(W/2-180, 58, 360, 38);
      ctx.strokeStyle = `rgba(255,170,145,${0.5 + p*0.35})`;
      ctx.strokeRect(W/2-180, 58, 360, 38);
      ctx.fillStyle = `rgba(255,232,220,${0.82 + p*0.18})`;
      ctx.font = 'bold 22px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(boss ? '🔥 Boss Wave Incoming!' : '💥 Boss Destroyed!', W/2, 84);
    }
    if (extraLifeMsg > 0) {
      const a = Math.min(1, extraLifeMsg/0.25);
      ctx.fillStyle=`rgba(157,255,190,${0.2 + a*0.35})`; ctx.fillRect(W/2-170,16,340,42);
      ctx.strokeStyle=`rgba(157,255,190,${0.6 + a*0.3})`; ctx.strokeRect(W/2-170,16,340,42);
      ctx.fillStyle=`rgba(215,255,228,${0.8 + a*0.2})`; ctx.font='bold 22px system-ui'; ctx.textAlign='center';
      ctx.fillText('✨ Extra Life Gained! +1', W/2, 45);
    }

    if (showHitboxes) {
      // player hitbox
      ctx.strokeStyle = 'rgba(120,220,255,0.9)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(player.x-18, player.y-20, 36, 40);

      // meteor hitboxes
      ctx.strokeStyle = 'rgba(120,255,150,0.98)';
      ctx.lineWidth = 2;
      for (const m of meteors) {
        ctx.fillStyle = 'rgba(80,255,130,0.14)';
        ctx.beginPath();
        ctx.arc(m.x, m.y, m.r*0.9, 0, Math.PI*2);
        ctx.fill();
        ctx.stroke();
      }

      // laser hitboxes
      ctx.strokeStyle = 'rgba(255,90,90,0.7)';
      for (const l of lasers) {
        if (l.warn <= 0 && l.fire > 0) {
          ctx.strokeRect(l.x - (l.w/2 + 14), 0, (l.w + 28), H);
        }
      }

      // boss missiles
      ctx.strokeStyle = 'rgba(255,170,80,0.95)';
      for (const m of bossMissiles) {
        ctx.beginPath();
        ctx.arc(m.x, m.y, m.r, 0, Math.PI*2);
        ctx.stroke();
      }

      // boss hitbox
      if (boss) {
        ctx.strokeStyle = 'rgba(255,215,140,0.9)';
        ctx.beginPath();
        ctx.arc(boss.x, boss.y, boss.r*0.82, 0, Math.PI*2);
        ctx.stroke();
      }
    }

    if (gameStarted && !running) {
      ctx.fillStyle='rgba(0,0,0,.56)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#fff'; ctx.font='bold 44px system-ui'; ctx.textAlign='center'; ctx.fillText('Game Over', W/2, H/2-14);
      ctx.font='24px system-ui'; ctx.fillText(`Score: ${Math.floor(score)}  |  Press Restart`, W/2, H/2+28);
    }

    ctx.restore();
  }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now-last)/1000);
    last = now;
    try { update(dt); draw(); } catch (e) { console.error('Meteor Dodge error:', e); }
    requestAnimationFrame(loop);
  }

  addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k === 'f') { fullscreenBtn.click(); return; }
    if (!gameStarted && k !== 'enter') return;
    if (k === ' ') { triggerWave(); return; }
    if (k === 'h') {
      showHitboxes = !showHitboxes;
      hitboxesBtn.textContent = `Hitboxes (H): ${showHitboxes ? 'On' : 'Off'}`;
      return;
    }
    if (k === 'l') {
      lowDetail = !lowDetail;
      lowDetailBtn.textContent = `Low Detail (L): ${lowDetail ? 'On' : 'Off'}`;
      if (lowDetail) {
        flames.length = 0;
        for (const m of meteors) m.trail.length = 0;
        shakeT = 0;
        shakeP = 0;
      }
      return;
    }
    if (k === 'arrowleft') keys.add('ArrowLeft');
    else if (k === 'arrowright') keys.add('ArrowRight');
    else keys.add(k);
  });

  addEventListener('keyup', e => {
    const k = e.key.toLowerCase();
    if (k === 'arrowleft') keys.delete('ArrowLeft');
    else if (k === 'arrowright') keys.delete('ArrowRight');
    else keys.delete(k);
  });

  lowDetailBtn.onclick = () => {
    lowDetail = !lowDetail;
    lowDetailBtn.textContent = `Low Detail (L): ${lowDetail ? 'On' : 'Off'}`;
    if (lowDetail) {
      flames.length = 0;
      for (const m of meteors) m.trail.length = 0;
      shakeT = 0;
      shakeP = 0;
    }
  };

  hitboxesBtn.onclick = () => {
    showHitboxes = !showHitboxes;
    hitboxesBtn.textContent = `Hitboxes (H): ${showHitboxes ? 'On' : 'Off'}`;
  };

  restartBtn.onclick = () => {
    if (!gameStarted) startGame();
    else reset();
  };

  fullscreenBtn.onclick = async () => {
    try {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
        fullscreenBtn.textContent = 'Exit Fullscreen';
      } else {
        await document.exitFullscreen();
        fullscreenBtn.textContent = 'Fullscreen';
      }
    } catch (err) {
      console.error('Fullscreen error:', err);
    }
  };

  document.addEventListener('fullscreenchange', () => {
    fullscreenBtn.textContent = document.fullscreenElement ? 'Exit Fullscreen' : 'Fullscreen';
  });

  startGameBtn.onclick = startGame;

  gameStarted = false;
  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
