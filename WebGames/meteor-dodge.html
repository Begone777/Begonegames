<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteor Dodge</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:#070b18; color:#fff; display:grid; place-items:center; min-height:100vh; }
    .wrap { width:min(900px,95vw); }
    h1 { margin:.2rem 0; }
    p { opacity:.85; margin:.2rem 0 .8rem; }
    canvas { width:100%; max-width:900px; height:auto; border:1px solid #2b335c; border-radius:12px; background:linear-gradient(#0b1130,#090d1f); display:block; }
    .row { display:flex; justify-content:space-between; align-items:center; margin-top:10px; gap:10px; flex-wrap:wrap; }
    .pill { padding:6px 10px; border:1px solid #2b335c; border-radius:999px; background:#111735; }
    button { background:#4f7cff; color:#fff; border:0; border-radius:10px; padding:8px 12px; cursor:pointer; font-weight:700; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>☄️ Meteor Dodge</h1>
    <p>Move with ← → (or A / D). Survive as long as you can.</p>
    <canvas id="game" width="900" height="520"></canvas>
    <div class="row">
      <div class="pill">Score: <span id="score">0</span></div>
      <div class="pill">Best: <span id="best">0</span></div>
      <button id="restart">Restart</button>
    </div>
  </main>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const restartBtn = document.getElementById('restart');

const W = canvas.width, H = canvas.height;
let keys = new Set();
let running = true;
let score = 0;
let best = Number(localStorage.getItem('meteor_dodge_best') || 0);
bestEl.textContent = best;

const player = { x: W/2, y: H-48, w: 52, h: 16, speed: 430 };
let meteors = [];
let spawnTimer = 0;
let spawnGap = 0.85;
let t = 0;

function reset() {
  running = true;
  score = 0;
  player.x = W/2;
  meteors = [];
  spawnTimer = 0;
  spawnGap = 0.85;
  t = 0;
}

function rand(a,b){ return Math.random()*(b-a)+a; }

function spawnMeteor() {
  const r = rand(9, 24);
  meteors.push({ x: rand(r, W-r), y: -30, r, vy: rand(120, 260) + t*8, vx: rand(-20,20) });
}

function hitRectCircle(rx, ry, rw, rh, cx, cy, cr) {
  const nx = Math.max(rx, Math.min(cx, rx + rw));
  const ny = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nx, dy = cy - ny;
  return dx*dx + dy*dy <= cr*cr;
}

function update(dt) {
  if (!running) return;
  t += dt;
  if (keys.has('ArrowLeft') || keys.has('a')) player.x -= player.speed*dt;
  if (keys.has('ArrowRight') || keys.has('d')) player.x += player.speed*dt;
  player.x = Math.max(player.w/2, Math.min(W-player.w/2, player.x));

  spawnTimer += dt;
  spawnGap = Math.max(0.25, 0.85 - t*0.015);
  while (spawnTimer >= spawnGap) { spawnTimer -= spawnGap; spawnMeteor(); }

  for (const m of meteors) {
    m.y += m.vy * dt;
    m.x += m.vx * dt;
    if (m.x < m.r || m.x > W - m.r) m.vx *= -1;
    if (hitRectCircle(player.x-player.w/2, player.y-player.h/2, player.w, player.h, m.x, m.y, m.r)) {
      running = false;
    }
  }
  meteors = meteors.filter(m => m.y < H + 50);

  score += dt * 10;
  scoreEl.textContent = Math.floor(score);
  if (score > best) {
    best = Math.floor(score);
    bestEl.textContent = best;
    localStorage.setItem('meteor_dodge_best', String(best));
  }
}

function draw() {
  ctx.clearRect(0,0,W,H);

  // stars
  for (let i=0;i<80;i++) {
    const x = (i*97 % W);
    const y = ((i*53 + performance.now()*0.02*(1+i%3)) % H);
    ctx.fillStyle = `rgba(255,255,255,${0.2 + (i%5)*0.1})`;
    ctx.fillRect(x, y, 2, 2);
  }

  // player
  ctx.fillStyle = '#6ecbff';
  ctx.fillRect(player.x-player.w/2, player.y-player.h/2, player.w, player.h);
  ctx.fillStyle = '#a8e5ff';
  ctx.fillRect(player.x-8, player.y-player.h/2-6, 16, 6);

  // meteors
  for (const m of meteors) {
    const g = ctx.createRadialGradient(m.x-4,m.y-6,2,m.x,m.y,m.r);
    g.addColorStop(0, '#ffd18a');
    g.addColorStop(1, '#ff6a3a');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
    ctx.fill();
  }

  if (!running) {
    ctx.fillStyle = 'rgba(0,0,0,.55)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 44px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over', W/2, H/2 - 10);
    ctx.font = '24px system-ui';
    ctx.fillText(`Score: ${Math.floor(score)}  |  Press Restart`, W/2, H/2 + 30);
  }
}

let last = performance.now();
function loop(now) {
  const dt = Math.min(0.033, (now-last)/1000);
  last = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

addEventListener('keydown', e => keys.add(e.key.toLowerCase() === 'arrowleft' ? 'ArrowLeft' : e.key.toLowerCase() === 'arrowright' ? 'ArrowRight' : e.key.toLowerCase()));
addEventListener('keyup', e => keys.delete(e.key.toLowerCase() === 'arrowleft' ? 'ArrowLeft' : e.key.toLowerCase() === 'arrowright' ? 'ArrowRight' : e.key.toLowerCase()));
restartBtn.onclick = reset;
</script>
</body>
</html>
