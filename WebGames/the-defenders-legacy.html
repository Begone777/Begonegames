<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Defender's Legacy — Emerald Frontier</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% 0%, #203b24, #0b1a11 68%);
      color: #ecffee;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .layout { display: grid; grid-template-columns: 1fr 340px; min-height: 100vh; }
    canvas {
      width: 100%; height: auto; aspect-ratio: 1480 / 900; display: block;
      background: linear-gradient(180deg, #1e4a27, #14331b 60%, #112a17);
      image-rendering: auto;
    }
    .panel {
      border-left: 1px solid #335d40;
      background: linear-gradient(180deg, #1f3e28, #142419);
      padding: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }
    h1 { margin: 0 0 6px; font-size: 21px; }
    .muted { opacity: .85; font-size: 13px; margin-bottom: 10px; }
    .stat {
      background: linear-gradient(180deg, #2a5436, #1d3a26);
      border: 1px solid #55886a;
      border-radius: 10px;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .grid { display: grid; gap: 8px; max-height: 56vh; overflow: auto; padding-right: 4px; }
    button, select {
      border: 1px solid #5f9a75;
      background: linear-gradient(180deg, #3f7a52, #2a5a3b);
      color: #fff;
      border-radius: 9px;
      padding: 9px;
      text-align: left;
      cursor: pointer;
      transition: .15s ease;
      font: inherit;
    }
    button:hover, select:hover { transform: translateY(-1px); }
    button.active { outline: 2px solid #f8e094; background: linear-gradient(180deg, #4f9163, #326b46); }
    .small { font-size: 12px; opacity: .9; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  </style>
</head>
<body>
  <div class="layout">
    <canvas id="game" width="1480" height="900"></canvas>
    <aside class="panel">
      <h1>Emerald Frontier</h1>
      <div class="muted">Forest tower defense — protect the heartwood.</div>
      <div class="row" style="margin-bottom:8px">
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
          <option value="nightmare">Nightmare</option>
        </select>
        <button id="startWaveBtn" style="font-weight:700;text-align:center">Start Wave</button>
      </div>
      <div class="row" style="margin-bottom:8px">
        <button id="restartBtn" style="font-weight:700;text-align:center">Restart</button>
        <button id="fullscreenBtn" style="font-weight:700;text-align:center">Fullscreen</button>
      </div>
      <div class="stat">Gold: <b id="gold">0</b></div>
      <div class="stat">Lives: <b id="lives">20</b></div>
      <div class="stat">Wave: <b id="wave">1</b></div>
      <div class="stat">Enemies left: <b id="left">0</b></div>
      <div class="small" style="margin-bottom:8px">Pick tower → click open grass. Tower identity is shown by color + icon shape.</div>
      <div id="towerList" class="grid"></div>
    </aside>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const goldEl = document.getElementById('gold');
const livesEl = document.getElementById('lives');
const waveEl = document.getElementById('wave');
const leftEl = document.getElementById('left');
const towerList = document.getElementById('towerList');
const startWaveBtn = document.getElementById('startWaveBtn');
const restartBtn = document.getElementById('restartBtn');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const difficultySel = document.getElementById('difficulty');

const W = canvas.width, H = canvas.height;
const CELL = 40;

const DIFFICULTY = {
  easy: { lives: 32, gold: 420, hp: 0.85, speed: 0.9, reward: 1.1, spawn: 0.95 },
  normal: { lives: 24, gold: 320, hp: 1.0, speed: 1.0, reward: 1.0, spawn: 1.0 },
  hard: { lives: 20, gold: 260, hp: 1.22, speed: 1.12, reward: 0.92, spawn: 1.08 },
  nightmare: { lives: 14, gold: 210, hp: 1.45, speed: 1.25, reward: 0.85, spawn: 1.18 }
};

const path = [
  {x: 30, y: 100}, {x: 300, y: 100}, {x: 300, y: 250}, {x: 660, y: 250},
  {x: 660, y: 140}, {x: 1150, y: 140}, {x: 1150, y: 430}, {x: 430, y: 430},
  {x: 430, y: 700}, {x: 1320, y: 700}, {x: 1320, y: 860}, {x: 1450, y: 860}
];

const TOWERS = [
  { key:'arrow', name:'Arrow Nest', cost:70, range:150, fireRate:0.85, dmg:16, color:'#8fd0ff', icon:'triangle' },
  { key:'cannon', name:'Bark Cannon', cost:120, range:140, fireRate:1.35, dmg:32, splash:52, color:'#ffb97d', icon:'square' },
  { key:'frost', name:'Frost Bloom', cost:100, range:130, fireRate:1.0, dmg:10, slow:0.55, slowTime:1.8, color:'#9fe6ff', icon:'diamond' },
  { key:'sniper', name:'Hawkeye Roost', cost:170, range:280, fireRate:2.2, dmg:76, color:'#f1d4ff', icon:'star' },
  { key:'mint', name:'Sap Mint', cost:130, range:0, fireRate:3.0, dmg:0, mint:26, color:'#ffe88b', icon:'hex' },
  { key:'poison', name:'Venom Thicket', cost:145, range:155, fireRate:1.2, dmg:12, poison:8, poisonTime:2.2, color:'#7fff98', icon:'leaf' },
  { key:'storm', name:'Storm Oak', cost:180, range:170, fireRate:1.7, dmg:24, chain:2, color:'#9db4ff', icon:'bolt' },
  { key:'ember', name:'Ember Totem', cost:155, range:145, fireRate:1.1, dmg:18, burn:11, burnTime:2.4, color:'#ff8f72', icon:'flame' },
  { key:'thorn', name:'Thorn Pod', cost:90, range:115, fireRate:0.45, dmg:8, color:'#b2ff8e', icon:'cross' },
  { key:'totem', name:'Spirit Totem', cost:210, range:150, fireRate:0, aura:0.17, color:'#ffd8ff', icon:'ring' },
  { key:'quarry', name:'Stone Quarry', cost:160, range:0, fireRate:4.2, dmg:0, mint:36, color:'#d8d3ba', icon:'gem' },
  { key:'sun', name:'Sun Prism', cost:240, range:200, fireRate:2.8, dmg:95, color:'#fff0a1', icon:'sun' },
  { key:'mist', name:'Mist Shrine', cost:185, range:160, fireRate:1.6, dmg:14, slow:0.7, slowTime:2.6, color:'#8df3ec', icon:'moon' },
  { key:'vine', name:'Vine Snare', cost:175, range:140, fireRate:1.9, dmg:18, root:0.7, color:'#68d27e', icon:'vines' },
  { key:'arcane', name:'Arcane Willow', cost:260, range:220, fireRate:2.0, dmg:56, splash:80, color:'#c59bff', icon:'orb' }
];

let selectedTower = TOWERS[0].key;
let towers = [], enemies = [], bullets = [], effects = [];
let gold = 320, lives = 24, wave = 1, spawnLeft = 0, spawnTimer = 0, gameOver = false, waveActive = false;
let diff = DIFFICULTY.normal;

const MONSTERS = [
  { name:'Imp', hp: 95, speed: 85, reward: 10, r: 8, color:'#f6d8a9' },
  { name:'Boar', hp: 170, speed: 58, reward: 14, r: 12, color:'#b89e7e' },
  { name:'Sprite', hp: 120, speed: 105, reward: 12, r: 7, color:'#a9f0ff' },
  { name:'Moss Golem', hp: 320, speed: 42, reward: 23, r: 15, color:'#8fb495' },
  { name:'Spore Bat', hp: 140, speed: 112, reward: 13, r: 8, color:'#d8a4ff' },
  { name:'Wraith', hp: 240, speed: 74, reward: 20, r: 11, color:'#c3e0ff' },
  { name:'Root Brute', hp: 430, speed: 40, reward: 28, r: 17, color:'#9d855f' }
];

function levelMonster(base, waveIndex) {
  const scale = 1 + waveIndex * 0.055;
  return {
    ...base,
    hp: Math.floor(base.hp * scale * diff.hp),
    hpMax: Math.floor(base.hp * scale * diff.hp),
    speed: base.speed * (1 + waveIndex * 0.01) * diff.speed,
    reward: Math.max(2, Math.floor(base.reward * (1 + waveIndex * 0.015) * diff.reward)),
    d: 0,
    slowMul: 1,
    slowT: 0,
    burn: 0,
    burnT: 0,
    poison: 0,
    poisonT: 0,
    rootT: 0
  };
}

function restartGame() {
  diff = DIFFICULTY[difficultySel.value] || DIFFICULTY.normal;
  towers = []; enemies = []; bullets = []; effects = [];
  gold = diff.gold; lives = diff.lives; wave = 1;
  spawnLeft = 0; spawnTimer = 0; gameOver = false; waveActive = false;
}

function makeButtons() {
  towerList.innerHTML = '';
  for (const t of TOWERS) {
    const b = document.createElement('button');
    b.innerHTML = `<b style="color:${t.color}">⬤</b> <b>${t.name}</b><div class='small'>Cost ${t.cost} • Range ${Math.floor(t.range || 0)}</div>`;
    if (t.key === selectedTower) b.classList.add('active');
    b.onclick = () => { selectedTower = t.key; makeButtons(); };
    towerList.appendChild(b);
  }
}

function dist(a,b,c,d){ return Math.hypot(c-a,d-b); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

function pathPos(d) {
  let rem = d;
  for (let i=0;i<path.length-1;i++) {
    const a = path[i], b = path[i+1];
    const seg = dist(a.x,a.y,b.x,b.y);
    if (rem <= seg) {
      const t = rem / seg;
      return { x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t, done:false };
    }
    rem -= seg;
  }
  return { x:path[path.length-1].x, y:path[path.length-1].y, done:true };
}

function isPathCell(x,y) {
  for (let i=0;i<path.length-1;i++) {
    const a = path[i], b = path[i+1];
    const minX = Math.min(a.x,b.x)-26, maxX = Math.max(a.x,b.x)+26;
    const minY = Math.min(a.y,b.y)-26, maxY = Math.max(a.y,b.y)+26;
    if (x>=minX&&x<=maxX&&y>=minY&&y<=maxY) return true;
  }
  return false;
}

startWaveBtn.addEventListener('click', () => { if (!gameOver && !waveActive) spawnWave(); });
restartBtn.addEventListener('click', restartGame);
difficultySel.addEventListener('change', restartGame);

fullscreenBtn.addEventListener('click', async () => {
  try {
    if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
    else await document.exitFullscreen();
  } catch (_) {}
});

canvas.addEventListener('mousedown', e => {
  if (gameOver) return;
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX-r.left) * (W/r.width);
  const y = (e.clientY-r.top) * (H/r.height);
  const cellX = Math.floor(x / CELL) * CELL + CELL/2;
  const cellY = Math.floor(y / CELL) * CELL + CELL/2;
  const tower = TOWERS.find(t=>t.key===selectedTower);
  if (!tower || gold < tower.cost || isPathCell(cellX,cellY)) return;
  if (towers.some(t => dist(t.x,t.y,cellX,cellY) < 34)) return;
  towers.push({ ...tower, x: cellX, y: cellY, cd: Math.random()*0.5 });
  gold -= tower.cost;
});

function spawnWave() {
  spawnLeft = 6 + Math.floor(wave * 1.95 * diff.spawn);
  spawnTimer = 0;
  waveActive = true;
}

function update(dt) {
  if (gameOver) return;
  if (waveActive && spawnLeft <= 0 && enemies.length === 0) { waveActive = false; wave++; }

  spawnTimer -= dt;
  if (waveActive && spawnLeft > 0 && spawnTimer <= 0) {
    const base = MONSTERS[(wave + spawnLeft + Math.floor(Math.random()*MONSTERS.length)) % MONSTERS.length];
    enemies.push(levelMonster(base, wave));
    spawnLeft--;
    spawnTimer = Math.max(0.12, (0.78 - wave * 0.011) / diff.spawn);
  }

  for (const e of enemies) {
    if (e.slowT > 0) { e.slowT -= dt; if (e.slowT <= 0) e.slowMul = 1; }
    if (e.rootT > 0) { e.rootT -= dt; if (e.rootT > 0) continue; }
    if (e.burnT > 0) { e.burnT -= dt; e.hp -= e.burn * dt; }
    if (e.poisonT > 0) { e.poisonT -= dt; e.hp -= e.poison * dt; }
    e.d += e.speed * e.slowMul * dt;
    const p = pathPos(e.d);
    e.x = p.x; e.y = p.y;
    if (p.done) { e.dead = true; lives--; if (lives<=0) gameOver=true; }
  }

  for (const t of towers) {
    t.cd -= dt;
    if ((t.key === 'mint' || t.key === 'quarry') && t.cd <= 0) {
      gold += t.mint;
      effects.push({ x:t.x, y:t.y-16, text:`+${t.mint}g`, t:0.8, c:'#ffe88b' });
      t.cd = t.fireRate;
      continue;
    }
    if (t.key === 'totem') continue;
    if (t.cd > 0) continue;

    let target = null, best = -1;
    for (const e of enemies) {
      if (e.dead) continue;
      if (dist(t.x,t.y,e.x,e.y) <= t.range && e.d > best) { best = e.d; target = e; }
    }
    if (!target) continue;

    const boost = towers.some(o => o.key==='totem' && dist(o.x,o.y,t.x,t.y) <= o.range) ? 1 + 0.17 : 1;
    bullets.push({
      x:t.x, y:t.y, tx:target.x, ty:target.y, target, speed:420,
      dmg:(t.dmg||0)*boost, splash:t.splash||0, slow:t.slow||0, slowTime:t.slowTime||0,
      burn:t.burn||0, burnTime:t.burnTime||0, poison:t.poison||0, poisonTime:t.poisonTime||0,
      root:t.root||0, chain:t.chain||0, color:t.color
    });
    t.cd = t.fireRate;
  }

  for (const b of bullets) {
    if (b.target.dead) { b.dead = true; continue; }
    b.tx = b.target.x; b.ty = b.target.y;
    const dx = b.tx - b.x, dy = b.ty - b.y;
    const d = Math.hypot(dx,dy) || 1;
    const step = b.speed * dt;
    b.x += dx / d * Math.min(step, d);
    b.y += dy / d * Math.min(step, d);
    if (d < 10) {
      const hits = [];
      if (b.splash > 0) {
        for (const e of enemies) if (!e.dead && dist(b.x,b.y,e.x,e.y) <= b.splash) hits.push(e);
      } else hits.push(b.target);
      if (b.chain > 0) {
        const nearby = enemies.filter(e=>!e.dead&&e!==b.target&&dist(b.target.x,b.target.y,e.x,e.y)<105).slice(0,b.chain);
        hits.push(...nearby);
      }
      for (const e of hits) {
        e.hp -= b.dmg;
        if (b.slow) { e.slowMul = Math.min(e.slowMul, b.slow); e.slowT = Math.max(e.slowT, b.slowTime); }
        if (b.burn) { e.burn = Math.max(e.burn, b.burn); e.burnT = Math.max(e.burnT, b.burnTime); }
        if (b.poison) { e.poison = Math.max(e.poison, b.poison); e.poisonT = Math.max(e.poisonT, b.poisonTime); }
        if (b.root) e.rootT = Math.max(e.rootT, b.root);
      }
      b.dead = true;
    }
  }

  for (const e of enemies) {
    if (!e.dead && e.hp <= 0) {
      e.dead = true;
      gold += e.reward;
      effects.push({x:e.x,y:e.y,text:`+${e.reward}g`,t:0.8,c:'#a6ffb8'});
    }
  }

  enemies = enemies.filter(e=>!e.dead);
  bullets = bullets.filter(b=>!b.dead);
  for (const fx of effects) { fx.t -= dt; fx.y -= 20*dt; }
  effects = effects.filter(f=>f.t>0);

  goldEl.textContent = Math.floor(gold);
  livesEl.textContent = lives;
  waveEl.textContent = wave;
  leftEl.textContent = enemies.length + spawnLeft;
  startWaveBtn.textContent = waveActive ? 'Wave running...' : `Start Wave ${wave}`;
}

function drawIcon(x,y,icon) {
  ctx.save();
  ctx.translate(x,y);
  ctx.strokeStyle = '#11231a';
  ctx.fillStyle = '#11231a';
  ctx.lineWidth = 2;
  if (icon === 'triangle') { ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(6,5); ctx.lineTo(-6,5); ctx.closePath(); ctx.stroke(); }
  else if (icon === 'square') ctx.strokeRect(-5,-5,10,10);
  else if (icon === 'diamond') { ctx.rotate(Math.PI/4); ctx.strokeRect(-4,-4,8,8); }
  else if (icon === 'star') { for (let i=0;i<5;i++){ ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(i*1.257)*7,Math.sin(i*1.257)*7); ctx.stroke(); } }
  else if (icon === 'hex') { ctx.beginPath(); for(let i=0;i<6;i++){ const a=i*Math.PI/3; ctx.lineTo(Math.cos(a)*6,Math.sin(a)*6);} ctx.closePath(); ctx.stroke(); }
  else if (icon === 'leaf') { ctx.beginPath(); ctx.ellipse(0,0,4,7,0,0,Math.PI*2); ctx.stroke(); }
  else if (icon === 'bolt') { ctx.beginPath(); ctx.moveTo(-2,-6); ctx.lineTo(3,-1); ctx.lineTo(-1,-1); ctx.lineTo(2,6); ctx.stroke(); }
  else if (icon === 'flame') { ctx.beginPath(); ctx.moveTo(0,-6); ctx.quadraticCurveTo(5,-1,0,6); ctx.quadraticCurveTo(-5,-1,0,-6); ctx.stroke(); }
  else if (icon === 'cross') { ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(5,0); ctx.moveTo(0,-5); ctx.lineTo(0,5); ctx.stroke(); }
  else if (icon === 'ring') { ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.stroke(); }
  else if (icon === 'gem') { ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(6,0); ctx.lineTo(0,6); ctx.lineTo(-6,0); ctx.closePath(); ctx.stroke(); }
  else if (icon === 'sun') { ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.stroke(); for(let i=0;i<8;i++){const a=i*Math.PI/4;ctx.beginPath();ctx.moveTo(Math.cos(a)*5,Math.sin(a)*5);ctx.lineTo(Math.cos(a)*8,Math.sin(a)*8);ctx.stroke();} }
  else if (icon === 'moon') { ctx.beginPath(); ctx.arc(-1,0,5,0,Math.PI*2); ctx.stroke(); }
  else if (icon === 'vines') { ctx.beginPath(); ctx.moveTo(-5,4); ctx.quadraticCurveTo(-2,-5,1,2); ctx.quadraticCurveTo(3,7,5,-4); ctx.stroke(); }
  else if (icon === 'orb') { ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.stroke(); }
  ctx.restore();
}

function draw() {
  // forest floor
  ctx.fillStyle = '#1c4728'; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha = 0.18;
  for (let i=0;i<180;i++) {
    ctx.fillStyle = i%2 ? '#2f6a3f' : '#245735';
    ctx.fillRect((i*47)%W, (i*91)%H, 8, 8);
  }
  ctx.globalAlpha = 1;

  // path
  ctx.lineWidth = 34;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#7a684f';
  ctx.beginPath();
  ctx.moveTo(path[0].x,path[0].y);
  for (let i=1;i<path.length;i++) ctx.lineTo(path[i].x,path[i].y);
  ctx.stroke();
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#b49b72';
  ctx.stroke();

  const t = TOWERS.find(v=>v.key===selectedTower);
  if (t) {
    const cx = Math.floor(mouse.x / CELL) * CELL + CELL/2;
    const cy = Math.floor(mouse.y / CELL) * CELL + CELL/2;
    ctx.strokeStyle = isPathCell(cx,cy) ? 'rgba(255,80,80,.8)' : 'rgba(210,255,220,.85)';
    ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.rect(cx-CELL/2+2, cy-CELL/2+2, CELL-4, CELL-4); ctx.stroke();
    if (t.range>0){ ctx.beginPath(); ctx.arc(cx,cy,t.range,0,Math.PI*2); ctx.stroke(); }
    ctx.setLineDash([]);
  }

  for (const tower of towers) {
    if (tower.range > 0) {
      ctx.strokeStyle = 'rgba(200,255,210,.12)';
      ctx.beginPath(); ctx.arc(tower.x,tower.y,tower.range,0,Math.PI*2); ctx.stroke();
    }
    ctx.fillStyle = tower.color;
    ctx.beginPath(); ctx.arc(tower.x,tower.y,13,0,Math.PI*2); ctx.fill();
    drawIcon(tower.x, tower.y, tower.icon);
  }

  for (const e of enemies) {
    ctx.fillStyle = e.color;
    ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.fillRect(e.x-15,e.y-17,30,4);
    ctx.fillStyle = '#7dff9c'; ctx.fillRect(e.x-15,e.y-17,30 * clamp(e.hp / e.hpMax,0,1),4);
  }

  for (const b of bullets) {
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x,b.y,4,0,Math.PI*2); ctx.fill();
  }

  for (const fx of effects) {
    ctx.globalAlpha = clamp(fx.t,0,1);
    ctx.fillStyle = fx.c;
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText(fx.text, fx.x, fx.y);
    ctx.globalAlpha = 1;
  }

  if (gameOver) {
    ctx.fillStyle='rgba(0,0,0,.62)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='bold 52px sans-serif'; ctx.fillText('Forest Lost', W/2-150, H/2-10);
    ctx.font='22px sans-serif'; ctx.fillText(`Reached Wave ${wave}`, W/2-95, H/2+30);
  }
}

let mouse = {x:0,y:0};
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX-r.left) * (W/r.width);
  mouse.y = (e.clientY-r.top) * (H/r.height);
});

let last = performance.now();
function loop(now){
  const dt = Math.min(0.033, (now-last)/1000); last = now;
  update(dt); draw(); requestAnimationFrame(loop);
}

restartGame();
makeButtons();
requestAnimationFrame(loop);
</script>
</body>
</html>
